# =============================================================================
# Nginx — API Gateway / Reverse Proxy
# Multi-Tenant SaaS Inventory Management System
# =============================================================================
# Routes:
#   /api/v1/users/*     → user-service:8001
#   /api/v1/products/*  → product-service:8002
#   /api/v1/inventory/* → inventory-service:8003
#   /api/v1/orders/*    → order-service:8004
#   /*                  → frontend:3000  (React SPA)
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    # -------------------------------------------------------------------------
    # Basic Settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;        # hide Nginx version

    # -------------------------------------------------------------------------
    # Buffer & Timeout Tuning
    # -------------------------------------------------------------------------
    client_max_body_size        64m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                60s;
    proxy_read_timeout          120s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          60s;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.api+json
        font/truetype
        font/opentype
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'tid=$http_x_tenant_id';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Upstream Definitions (with passive health-checks)
    # -------------------------------------------------------------------------
    upstream user_service {
        server user-service:8001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream product_service {
        server product-service:8002 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream inventory_service {
        server inventory-service:8003 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream order_service {
        server order-service:8004 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend_app {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # -------------------------------------------------------------------------
    # Rate Limiting Zones
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api_limit:20m   rate=300r/m;
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m  rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # Shared Proxy Headers Map
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS Redirect (commented out until SSL certs are provisioned)
    # Uncomment and configure the HTTPS server block below for production.
    # -------------------------------------------------------------------------
    # server {
    #     listen 80 default_server;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # =========================================================================
    # Main Server Block
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        # Disable access log for health check endpoint to reduce noise
        location = /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ---------------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------------
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        # Uncomment for HTTPS:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ---------------------------------------------------------------------
        # CORS (global — adjust origins for production)
        # ---------------------------------------------------------------------
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }

        # Pre-flight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Tenant-Id, X-Request-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age           "86400" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        # ---------------------------------------------------------------------
        # Common Proxy Headers (macro-style via include)
        # ---------------------------------------------------------------------
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";   # disable hop-by-hop for keepalive

        # =====================================================================
        # Route: /api/v1/users  →  user-service:8001
        # =====================================================================
        location /api/v1/users {
            limit_req  zone=api_limit  burst=30  nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://user_service;
            proxy_set_header X-Service-Name "user-service";
        }

        # Auth sub-routes get stricter rate limiting
        location ~* ^/api/v1/users/(login|register|password) {
            limit_req  zone=auth_limit burst=5 nodelay;

            proxy_pass http://user_service;
            proxy_set_header X-Service-Name "user-service";
        }

        # =====================================================================
        # Route: /api/v1/products  →  product-service:8002
        # =====================================================================
        location /api/v1/products {
            limit_req  zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://product_service;
            proxy_set_header X-Service-Name "product-service";
        }

        # =====================================================================
        # Route: /api/v1/inventory  →  inventory-service:8003
        # =====================================================================
        location /api/v1/inventory {
            limit_req  zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://inventory_service;
            proxy_set_header X-Service-Name "inventory-service";
        }

        # =====================================================================
        # Route: /api/v1/orders  →  order-service:8004
        # =====================================================================
        location /api/v1/orders {
            limit_req  zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://order_service;
            proxy_set_header X-Service-Name "order-service";
        }

        # =====================================================================
        # Catch-all API fallback (returns structured JSON 404)
        # =====================================================================
        location /api/ {
            return 404 '{"error":"Not Found","message":"The requested API endpoint does not exist."}';
            add_header Content-Type application/json always;
        }

        # =====================================================================
        # Route: /  →  frontend:3000 (React SPA)
        # =====================================================================
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SPA fallback: let React Router handle 404s
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend_app;
        }

        # =====================================================================
        # Static asset caching (when serving pre-built SPA via Nginx directly)
        # =====================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend_app;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;
        }

        # =====================================================================
        # Block common attack patterns
        # =====================================================================
        location ~* \.(php|asp|aspx|jsp|cgi|sh|bash)$ {
            return 403;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # =========================================================================
    # HTTPS Server Block — uncomment & configure for production
    # =========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #     # ... (copy all location blocks from the HTTP server block above)
    # }
}
