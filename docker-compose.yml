version: '3.8'

services:
  # =========================================================================
  # Inventory Service
  # Manages product inventory: stock levels, reservations, and fulfillments.
  # Exposes endpoints consumed by the Order Service for distributed transactions.
  # =========================================================================
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Inventory Service"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://inventory-service:8000"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - ./inventory-service:/var/www/html
      - inventory-db:/var/www/html/database
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/inventories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Order Service
  # Manages customer orders with full CRUD operations.
  # Uses distributed transactions (Saga pattern) to coordinate with the
  # Inventory Service to ensure data consistency across both services.
  # =========================================================================
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8001:8001"
    environment:
      APP_NAME: "Order Service"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://order-service:8001"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      INVENTORY_SERVICE_URL: "http://inventory-service:8000"
      INVENTORY_SERVICE_TIMEOUT: "10"
    volumes:
      - ./order-service:/var/www/html
      - order-db:/var/www/html/database
    networks:
      - microservices-network
    depends_on:
      inventory-service:
        condition: service_healthy

volumes:
  inventory-db:
  order-db:

networks:
  microservices-network:
    driver: bridge
