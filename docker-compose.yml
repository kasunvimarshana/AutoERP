version: '3.9'

networks:
  saga-network:
    driver: bridge

volumes:
  mysql-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
  mongo-data:

services:
  # ─── Message Broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: saga-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saga-network

  # ─── Saga State Store ────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: saga-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - saga-network

  # ─── Order Service DB ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: saga-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orders_db
      MYSQL_USER: orders_user
      MYSQL_PASSWORD: orders_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saga-network

  # ─── Inventory Service DB ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saga-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saga-network

  # ─── Order Service (Saga Orchestrator) ───────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: saga-order-service
    ports:
      - "8000:8000"
    environment:
      APP_NAME: OrderService
      APP_ENV: production
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: orders_db
      DB_USERNAME: orders_user
      DB_PASSWORD: orders_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      SAGA_TIMEOUT: 300
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saga-network
    restart: unless-stopped

  # ─── Inventory Service ───────────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: saga-inventory-service
    ports:
      - "8001:8001"
    environment:
      APP_NAME: InventoryService
      APP_ENV: production
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      APP_URL: http://localhost:8001
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: inventory_db
      DB_USERNAME: inventory_user
      DB_PASSWORD: inventory_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saga-network
    restart: unless-stopped

  # ─── Payment Service (Go) ────────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: saga-payment-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GIN_MODE: release
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - saga-network
    restart: unless-stopped

  # ─── Notification Service (Node.js) ─────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: saga-notification-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      MONGODB_URI: mongodb://mongo:27017/notifications_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: 587
      EMAIL_USER: ""
      EMAIL_PASS: ""
      NODE_ENV: production
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - saga-network
    restart: unless-stopped

  # ─── MongoDB (Notification Service) ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: saga-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: notifications_db
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saga-network

  # ─── API Gateway (Nginx) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: saga-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
      - inventory-service
      - payment-service
      - notification-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - saga-network
    restart: unless-stopped
