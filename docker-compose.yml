version: '3.8'

networks:
  kvsaas_network:
    driver: bridge

volumes:
  auth_db_data:
  user_db_data:
  product_db_data:
  inventory_db_data:
  order_db_data:
  redis_data:
  rabbitmq_data:

services:

  # ─────────────────────────────────────────────
  # API Gateway (Nginx)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kvsaas_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kvsaas_network
    depends_on:
      - auth-service
      - user-service
      - product-service
      - inventory-service
      - order-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Auth Service
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: production
    container_name: kvsaas_auth_service
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${AUTH_APP_KEY}
      APP_URL: ${AUTH_APP_URL:-http://auth-service:8001}
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: ${AUTH_DB_DATABASE:-auth_db}
      DB_USERNAME: ${AUTH_DB_USERNAME:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      PASSPORT_PERSONAL_ACCESS_CLIENT_ID: ${PASSPORT_PERSONAL_ACCESS_CLIENT_ID}
      PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET: ${PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET}
    networks:
      - kvsaas_network
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-db:
    image: mysql:8.0
    container_name: kvsaas_auth_db
    environment:
      MYSQL_DATABASE: ${AUTH_DB_DATABASE:-auth_db}
      MYSQL_USER: ${AUTH_DB_USERNAME:-auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/mysql
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: production
    container_name: kvsaas_user_service
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${USER_APP_KEY}
      APP_URL: ${USER_APP_URL:-http://user-service:8002}
      DB_CONNECTION: mysql
      DB_HOST: user-db
      DB_PORT: 3306
      DB_DATABASE: ${USER_DB_DATABASE:-user_db}
      DB_USERNAME: ${USER_DB_USERNAME:-user_db_user}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
    networks:
      - kvsaas_network
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-db:
    image: mysql:8.0
    container_name: kvsaas_user_db
    environment:
      MYSQL_DATABASE: ${USER_DB_DATABASE:-user_db}
      MYSQL_USER: ${USER_DB_USERNAME:-user_db_user}
      MYSQL_PASSWORD: ${USER_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${USER_DB_ROOT_PASSWORD}
    volumes:
      - user_db_data:/var/lib/mysql
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Product Service
  # ─────────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
      target: production
    container_name: kvsaas_product_service
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${PRODUCT_APP_KEY}
      APP_URL: ${PRODUCT_APP_URL:-http://product-service:8003}
      DB_CONNECTION: mysql
      DB_HOST: product-db
      DB_PORT: 3306
      DB_DATABASE: ${PRODUCT_DB_DATABASE:-product_db}
      DB_USERNAME: ${PRODUCT_DB_USERNAME:-product_db_user}
      DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
    networks:
      - kvsaas_network
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  product-db:
    image: mysql:8.0
    container_name: kvsaas_product_db
    environment:
      MYSQL_DATABASE: ${PRODUCT_DB_DATABASE:-product_db}
      MYSQL_USER: ${PRODUCT_DB_USERNAME:-product_db_user}
      MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${PRODUCT_DB_ROOT_PASSWORD}
    volumes:
      - product_db_data:/var/lib/mysql
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Inventory Service
  # ─────────────────────────────────────────────
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
      target: production
    container_name: kvsaas_inventory_service
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${INVENTORY_APP_KEY}
      APP_URL: ${INVENTORY_APP_URL:-http://inventory-service:8004}
      DB_CONNECTION: mysql
      DB_HOST: inventory-db
      DB_PORT: 3306
      DB_DATABASE: ${INVENTORY_DB_DATABASE:-inventory_db}
      DB_USERNAME: ${INVENTORY_DB_USERNAME:-inventory_db_user}
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8003}
    networks:
      - kvsaas_network
    depends_on:
      inventory-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  inventory-db:
    image: mysql:8.0
    container_name: kvsaas_inventory_db
    environment:
      MYSQL_DATABASE: ${INVENTORY_DB_DATABASE:-inventory_db}
      MYSQL_USER: ${INVENTORY_DB_USERNAME:-inventory_db_user}
      MYSQL_PASSWORD: ${INVENTORY_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${INVENTORY_DB_ROOT_PASSWORD}
    volumes:
      - inventory_db_data:/var/lib/mysql
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Order Service
  # ─────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
      target: production
    container_name: kvsaas_order_service
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${ORDER_APP_KEY}
      APP_URL: ${ORDER_APP_URL:-http://order-service:8005}
      DB_CONNECTION: mysql
      DB_HOST: order-db
      DB_PORT: 3306
      DB_DATABASE: ${ORDER_DB_DATABASE:-order_db}
      DB_USERNAME: ${ORDER_DB_USERNAME:-order_db_user}
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8003}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service:8004}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8002}
    networks:
      - kvsaas_network
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  order-db:
    image: mysql:8.0
    container_name: kvsaas_order_db
    environment:
      MYSQL_DATABASE: ${ORDER_DB_DATABASE:-order_db}
      MYSQL_USER: ${ORDER_DB_USERNAME:-order_db_user}
      MYSQL_PASSWORD: ${ORDER_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ORDER_DB_ROOT_PASSWORD}
    volumes:
      - order_db_data:/var/lib/mysql
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Redis (Cache / Queue)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kvsaas_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # RabbitMQ (Message Broker)
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: kvsaas_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-kvsaas}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - kvsaas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
