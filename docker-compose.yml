version: "3.9"

networks:
  microservices_network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
  rabbitmq_data:
  redis_data:

services:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ORDER_SERVICE_URL: http://order-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:3001
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      - order-service
      - payment-service
      - inventory-service
      - notification-service
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Order Service ────────────────────────────────────────────────────────────
  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8001:8000"
    environment:
      APP_NAME: OrderService
      APP_ENV: production
      APP_KEY: ${ORDER_APP_KEY:?ORDER_APP_KEY must be set (run: php artisan key:generate --show)}
      APP_DEBUG: "false"
      APP_URL: http://order-service:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: orders_db
      DB_USERNAME: orders_user
      DB_PASSWORD: orders_pass
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin_password
      RABBITMQ_VHOST: /
      PAYMENT_SERVICE_URL: http://payment-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:3001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8002:8000"
    environment:
      APP_NAME: PaymentService
      APP_ENV: production
      APP_KEY: ${PAYMENT_APP_KEY:?PAYMENT_APP_KEY must be set (run: php artisan key:generate --show)}
      APP_DEBUG: "false"
      APP_URL: http://payment-service:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: payments_db
      DB_USERNAME: payments_user
      DB_PASSWORD: payments_pass
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin_password
      RABBITMQ_VHOST: /
      ORDER_SERVICE_URL: http://order-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Inventory Service ────────────────────────────────────────────────────────
  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    ports:
      - "8003:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: inventory_db
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672/
      ORDER_SERVICE_URL: http://order-service:8000
      LOG_LEVEL: INFO
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "8004:3001"
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-no-reply@example.com}
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: orders_db
      MYSQL_USER: orders_user
      MYSQL_PASSWORD: orders_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uorders_user", "-porders_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: payments_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: inventory_db
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices_network
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
