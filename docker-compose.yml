version: '3.8'

services:
  mysql-auth:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - kv-network

  mysql-inventory:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inv_user
      MYSQL_PASSWORD: inv_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql-inventory-data:/var/lib/mysql
    networks:
      - kv-network

  mysql-order:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3309:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    networks:
      - kv-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kv-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - kv-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - kv-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - kv-network

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:9000"
    depends_on:
      - mysql-auth
      - redis
      - rabbitmq
    networks:
      - kv-network

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8002:9000"
    depends_on:
      - mysql-inventory
      - redis
      - rabbitmq
      - kafka
    networks:
      - kv-network

  order-service:
    build: ./services/order-service
    ports:
      - "8003:9000"
    depends_on:
      - mysql-order
      - redis
      - rabbitmq
      - kafka
    networks:
      - kv-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "8004:9000"
    depends_on:
      - redis
      - rabbitmq
    networks:
      - kv-network

  saga-orchestrator:
    build: ./services/saga-orchestrator
    ports:
      - "8005:9000"
    depends_on:
      - redis
      - rabbitmq
      - kafka
    networks:
      - kv-network

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:3000"
    depends_on:
      - auth-service
      - inventory-service
      - order-service
    networks:
      - kv-network

networks:
  kv-network:
    driver: bridge

volumes:
  mysql-auth-data:
  mysql-inventory-data:
  mysql-order-data:
  redis-data:
  rabbitmq-data:
