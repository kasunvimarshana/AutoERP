version: '3.8'

services:
  # ─── Auth Service ───────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      APP_NAME: AuthService
      APP_ENV: production
      APP_KEY: base64:9Go9vnnQL28Ne1a6pHO9nXnmEaPmeFJh0aYFaLvexVY=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8001
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
    volumes:
      - auth_db:/app/database
    networks:
      - microservices

  # ─── User Service ───────────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8002:8002"
    environment:
      APP_NAME: UserService
      APP_ENV: production
      APP_KEY: base64:9Go9vnnQL28Ne1a6pHO9nXnmEaPmeFJh0aYFaLvexVY=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8002
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      AUTH_SERVICE_URL: http://auth-service:8001
    volumes:
      - user_db:/app/database
    depends_on:
      - auth-service
    networks:
      - microservices

  # ─── Product Service ────────────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8003:8003"
    environment:
      APP_NAME: ProductService
      APP_ENV: production
      APP_KEY: base64:9Go9vnnQL28Ne1a6pHO9nXnmEaPmeFJh0aYFaLvexVY=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8003
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
    volumes:
      - product_db:/app/database
    networks:
      - microservices

  # ─── Inventory Service ──────────────────────────────────────────────
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8004:8004"
    environment:
      APP_NAME: InventoryService
      APP_ENV: production
      APP_KEY: base64:9Go9vnnQL28Ne1a6pHO9nXnmEaPmeFJh0aYFaLvexVY=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8004
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      PRODUCT_SERVICE_URL: http://product-service:8003
    volumes:
      - inventory_db:/app/database
    depends_on:
      - product-service
    networks:
      - microservices

  # ─── Order Service ──────────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8005:8005"
    environment:
      APP_NAME: OrderService
      APP_ENV: production
      APP_KEY: base64:9Go9vnnQL28Ne1a6pHO9nXnmEaPmeFJh0aYFaLvexVY=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8005
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      PRODUCT_SERVICE_URL: http://product-service:8003
      INVENTORY_SERVICE_URL: http://inventory-service:8004
    volumes:
      - order_db:/app/database
    depends_on:
      - product-service
      - inventory-service
    networks:
      - microservices

volumes:
  auth_db:
  user_db:
  product_db:
  inventory_db:
  order_db:

networks:
  microservices:
    driver: bridge
