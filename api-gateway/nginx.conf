# ── Worker Configuration ──────────────────────────────────────────────────────
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream="$upstream_addr" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream order_service {
        server order-service:8000;
        keepalive 32;
    }

    upstream inventory_service {
        server inventory-service:8001;
        keepalive 32;
    }

    upstream payment_service {
        server payment-service:8002;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8003;
        keepalive 32;
    }

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # api_limit  (60 req/min): general cap for read-heavy endpoints
    #   (products, inventory, notifications) to prevent scraping / DoS.
    # order_limit (30 req/min): tighter cap for order creation, which triggers
    #   the full SAGA workflow (DB writes, RabbitMQ messages, payment calls).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=order_limit:10m rate=30r/m;

    # ── CORS Map ──────────────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    }

    # ── Main Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options         "SAMEORIGIN"           always;
        add_header X-Content-Type-Options  "nosniff"              always;
        add_header X-XSS-Protection        "1; mode=block"        always;
        add_header Referrer-Policy         "strict-origin"        always;

        # CORS headers
        add_header Access-Control-Allow-Origin      $cors_origin  always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true"        always;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept";
            add_header Access-Control-Max-Age           1728000;
            add_header Content-Length 0;
            add_header Content-Type  "text/plain; charset=UTF-8";
            return 204;
        }

        # ── Shared proxy settings ─────────────────────────────────────────────
        proxy_http_version         1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
        proxy_connect_timeout              10s;
        proxy_send_timeout                 30s;
        proxy_read_timeout                 30s;
        proxy_buffering                    on;
        proxy_buffer_size                  4k;
        proxy_buffers                      8 4k;

        # ── Gateway health check ──────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Order Service ─────────────────────────────────────────────────────
        location /api/orders {
            limit_req zone=order_limit burst=10 nodelay;
            proxy_pass http://order_service;
        }

        location /api/health/orders {
            proxy_pass http://order_service/api/health;
        }

        # ── Inventory Service ─────────────────────────────────────────────────
        location /api/products {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://inventory_service;
        }

        location /api/inventory {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://inventory_service;
        }

        location /api/health/inventory {
            proxy_pass http://inventory_service/api/health;
        }

        # ── Payment Service ───────────────────────────────────────────────────
        location /api/payments {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://payment_service;
        }

        location /api/health/payments {
            proxy_pass http://payment_service/health;
        }

        # ── Notification Service ──────────────────────────────────────────────
        location /api/notifications {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notification_service;
        }

        location /api/health/notifications {
            proxy_pass http://notification_service/health;
        }

        # ── 404 fallback ──────────────────────────────────────────────────────
        location / {
            return 404 '{"message":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
