# RabbitMQ configuration for LaravelSAGA
# Loaded alongside definitions.json on broker startup

# Load definitions at boot so exchanges/queues/bindings are pre-created
load_definitions = /etc/rabbitmq/definitions.json

# Networking
listeners.tcp.default = 5672
management.listener.port = 15672
management.listener.ssl = false

# Logging
log.console = true
log.console.level = info
log.file = false

# Resource limits
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 2GB

# Heartbeat (seconds) – keep connections alive through NAT/firewalls
heartbeat = 60

# Consumer acknowledgement timeout (ms) – prevents stuck messages
consumer_timeout = 1800000

# Channel max per connection
channel_max = 128
