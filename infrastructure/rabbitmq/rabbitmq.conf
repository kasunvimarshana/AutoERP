## =============================================================================
## RabbitMQ — Main Configuration
## Docs: https://www.rabbitmq.com/configure.html
## =============================================================================

## ---------------------------------------------------------------------------
## Networking
## ---------------------------------------------------------------------------
listeners.tcp.default = 5672
management.tcp.port   = 15672

## Maximum number of connections
tcp_listen_options.backlog      = 4096
tcp_listen_options.nodelay      = true
tcp_listen_options.sndbuf       = 196608
tcp_listen_options.recbuf       = 196608
tcp_listen_options.keepalive    = true

## ---------------------------------------------------------------------------
## Virtual Host & Default User (overridden by Docker env vars at first boot)
## ---------------------------------------------------------------------------
default_vhost    = saas_vhost
default_user     = rabbit_user
default_pass     = rabbit_secret
default_user_tags.administrator = true

## Default permissions on the vhost
default_permissions.configure = .*
default_permissions.read      = .*
default_permissions.write     = .*

## ---------------------------------------------------------------------------
## Resource Limits
## ---------------------------------------------------------------------------
## Memory high watermark — pause publishing when broker uses > 60% of RAM
vm_memory_high_watermark.relative = 0.60

## Disk free space low watermark
disk_free_limit.relative = 2.0

## Channel max per connection
channel_max = 2047

## Frame size
frame_max = 131072

## Heartbeat interval (seconds)
heartbeat = 60

## ---------------------------------------------------------------------------
## Queue / Message Settings
## ---------------------------------------------------------------------------
## Max message size (16 MB)
max_message_size = 16777216

## Queue index embed messages smaller than this (bytes) in segment files
queue_index_embed_msgs_below = 4096

## ---------------------------------------------------------------------------
## Persistent Message Store
## ---------------------------------------------------------------------------
## Number of msg store I/O threads
msg_store_io_batch_size = 4096
msg_store_file_size_limit = 268435456

## ---------------------------------------------------------------------------
## Logging
## ---------------------------------------------------------------------------
log.console              = true
log.console.level        = info
log.file                 = rabbit.log
log.file.level           = warning
log.file.rotation.date   = $D0
log.file.rotation.size   = 10485760
log.file.rotation.count  = 5

## Connection-level logging (set to debug only for troubleshooting)
log.connection.level     = info
log.channel.level        = warning
log.mirroring.level      = warning

## ---------------------------------------------------------------------------
## Management Plugin
## ---------------------------------------------------------------------------
management.rates_mode           = basic
management.load_definitions     = /etc/rabbitmq/definitions.json
management.path_prefix          = /rabbitmq

## Disable basic auth on management API (use OAuth2 in production)
management.disable_basic_auth   = false

## ---------------------------------------------------------------------------
## Plugins
## ---------------------------------------------------------------------------
## Loaded via `rabbitmq-plugins enable` or RABBITMQ_ENABLED_PLUGINS_FILE
## Ensure the following are enabled:
##   rabbitmq_management
##   rabbitmq_shovel
##   rabbitmq_shovel_management
##   rabbitmq_delayed_message_exchange
##   rabbitmq_prometheus

## ---------------------------------------------------------------------------
## Prometheus Metrics (requires rabbitmq_prometheus plugin)
## ---------------------------------------------------------------------------
prometheus.tcp.port    = 15692
prometheus.path        = /metrics
prometheus.return_per_object_metrics = false

## ---------------------------------------------------------------------------
## High-Availability Policies
## (Apply via management UI or rabbitmqctl after startup)
## ---------------------------------------------------------------------------
## Example policy to mirror all queues:
##   rabbitmqctl set_policy ha-all ".*" '{"ha-mode":"all"}' --apply-to queues
##
## Quorum queues (preferred over classic mirrored queues since RabbitMQ 3.8):
##   Use x-queue-type: quorum when declaring queues in application code.

## ---------------------------------------------------------------------------
## Dead Letter Exchange
## ---------------------------------------------------------------------------
## Declare a dead-letter exchange named `dlx` in application bootstrap:
##   Channel.exchangeDeclare("dlx", "direct", true)
## Set per-queue: x-dead-letter-exchange = dlx

