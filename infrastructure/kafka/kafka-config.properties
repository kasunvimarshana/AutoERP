# =============================================================================
# Kafka Broker — Extra Configuration
# Applied on top of Bitnami Kafka defaults (server-extra.properties)
# Mounted into the container as /opt/bitnami/kafka/config/server-extra.properties
# =============================================================================

# ---------------------------------------------------------------------------
# Broker Identity
# ---------------------------------------------------------------------------
broker.id=1
broker.rack=rack-1

# ---------------------------------------------------------------------------
# Listeners
# ---------------------------------------------------------------------------
listeners=PLAINTEXT://:9092
advertised.listeners=PLAINTEXT://kafka:9092
listener.security.protocol.map=PLAINTEXT:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

# ---------------------------------------------------------------------------
# Zookeeper
# ---------------------------------------------------------------------------
zookeeper.connect=zookeeper:2181
zookeeper.connection.timeout.ms=18000
zookeeper.session.timeout.ms=18000

# ---------------------------------------------------------------------------
# Log / Topic Defaults
# ---------------------------------------------------------------------------
num.network.threads=4
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# Default number of partitions for auto-created topics
num.partitions=3
# Default replication factor (single broker dev setup — set to 3 in production)
default.replication.factor=1
min.insync.replicas=1

# ---------------------------------------------------------------------------
# Log Storage
# ---------------------------------------------------------------------------
log.dirs=/bitnami/kafka/data
log.segment.bytes=1073741824
log.retention.hours=168
log.retention.check.interval.ms=300000
log.cleanup.policy=delete

# Compacted topics for event sourcing / CDC
# Individual topics override this via topic-level config

# ---------------------------------------------------------------------------
# Topic Auto-Creation
# ---------------------------------------------------------------------------
auto.create.topics.enable=true
delete.topic.enable=true
auto.leader.rebalance.enable=true

# ---------------------------------------------------------------------------
# Performance Tuning
# ---------------------------------------------------------------------------
num.replica.fetchers=1
replica.fetch.max.bytes=1048576
replica.fetch.wait.max.ms=500
replica.high.watermark.checkpoint.interval.ms=5000

# Producer compression
compression.type=producer

# Message size limits (10 MB)
message.max.bytes=10485760
replica.fetch.max.bytes=10485760

# ---------------------------------------------------------------------------
# Consumer Group Coordination
# ---------------------------------------------------------------------------
group.initial.rebalance.delay.ms=3000
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# ---------------------------------------------------------------------------
# Well-known Topics (created at startup by init scripts or Kafka admin)
# ---------------------------------------------------------------------------
# inventory.item.created
# inventory.item.updated
# inventory.item.deleted
# inventory.stock.reserved
# inventory.stock.released
# inventory.stock.depleted
# order.placed
# order.confirmed
# order.cancelled
# order.shipped
# order.delivered
# order.saga.started
# order.saga.completed
# order.saga.failed
# order.saga.compensated
# auth.user.registered
# auth.user.login
# auth.tenant.created
# notification.email.queued
# notification.sms.queued
# notification.push.queued

# ---------------------------------------------------------------------------
# Metrics (JMX) — enable if Prometheus JMX exporter sidecar is used
# ---------------------------------------------------------------------------
# kafka.metrics.reporters=io.confluent.metrics.reporter.ConfluentMetricsReporter
