# =============================================================================
# Nginx — Reverse Proxy Virtual Host
# Routes API traffic to appropriate microservices
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream Definitions
# ---------------------------------------------------------------------------
upstream api_gateway {
    least_conn;
    server api-gateway:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream auth_service {
    least_conn;
    server auth-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream inventory_service {
    least_conn;
    server inventory-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream order_service {
    least_conn;
    server order-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream notification_service {
    least_conn;
    server notification-service:3000 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

# ---------------------------------------------------------------------------
# CORS Map
# ---------------------------------------------------------------------------
map $http_origin $cors_origin {
    default "";
    "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    "~^https://app\.yourdomain\.com$"                 $http_origin;
    "~^https://admin\.yourdomain\.com$"               $http_origin;
}

map $request_method $cors_method {
    OPTIONS 1;
    default 0;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (comment out if TLS is terminated upstream)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Allow health check over plain HTTP
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Main HTTPS Server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    # -------------------------------------------------------------------
    # TLS — replace with your real certs (e.g. Let's Encrypt via Certbot)
    # -------------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # -------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # -------------------------------------------------------------------
    # Request Tracking
    # -------------------------------------------------------------------
    set $request_id_val $http_x_request_id;
    if ($request_id_val = "") {
        set $request_id_val $request_id;
    }
    add_header X-Request-ID $request_id_val always;

    # -------------------------------------------------------------------
    # Global Proxy Settings
    # -------------------------------------------------------------------
    proxy_http_version      1.1;
    proxy_set_header        Host               $host;
    proxy_set_header        X-Real-IP          $remote_addr;
    proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto  $scheme;
    proxy_set_header        X-Forwarded-Host   $host;
    proxy_set_header        X-Forwarded-Port   $server_port;
    proxy_set_header        X-Request-ID       $request_id_val;
    proxy_set_header        Connection         "";   # keep-alive to upstream

    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffers           16 64k;
    proxy_buffer_size       128k;
    proxy_busy_buffers_size 256k;
    proxy_next_upstream     error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # -------------------------------------------------------------------
    # CORS Pre-flight Handler (OPTIONS)
    # -------------------------------------------------------------------
    location @cors_preflight {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, X-Tenant-ID, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           "86400" always;
        add_header Content-Type                     "text/plain; charset=utf-8";
        add_header Content-Length                   0;
        return 204;
    }

    # -------------------------------------------------------------------
    # Health — Nginx self
    # -------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 '{"service":"nginx","status":"ok"}';
        add_header Content-Type application/json always;
    }

    # -------------------------------------------------------------------
    # Auth Service  →  /api/auth/*
    # -------------------------------------------------------------------
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_conn conn_limit 20;

        if ($cors_method) {
            return 204;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        proxy_pass http://auth_service;

        # Strip the /api prefix so auth-service receives /auth/*
        rewrite ^/api/(.*)$ /$1 break;
    }

    # -------------------------------------------------------------------
    # Inventory Service  →  /api/inventory/*
    # -------------------------------------------------------------------
    location /api/inventory/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;

        if ($cors_method) {
            return 204;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        proxy_pass http://inventory_service;

        rewrite ^/api/(.*)$ /$1 break;
    }

    # -------------------------------------------------------------------
    # Order Service  →  /api/orders/*
    # -------------------------------------------------------------------
    location /api/orders/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;

        if ($cors_method) {
            return 204;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        proxy_pass http://order_service;

        rewrite ^/api/(.*)$ /$1 break;
    }

    # -------------------------------------------------------------------
    # Notification Service  →  /api/notifications/*
    # -------------------------------------------------------------------
    location /api/notifications/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn conn_limit 20;

        if ($cors_method) {
            return 204;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        # WebSocket upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;

        proxy_pass http://notification_service;

        rewrite ^/api/(.*)$ /$1 break;
    }

    # -------------------------------------------------------------------
    # API Gateway  →  all other /api/* and root traffic
    # -------------------------------------------------------------------
    location / {
        limit_req zone=global_limit burst=50 nodelay;
        limit_conn conn_limit 50;

        if ($cors_method) {
            return 204;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;

        proxy_pass http://api_gateway;
    }

    # -------------------------------------------------------------------
    # Custom Error Pages
    # -------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service temporarily unavailable. Please retry.","code":503}';
        add_header Content-Type application/json always;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too many requests. Please slow down.","code":429}';
        add_header Content-Type application/json always;
    }
}

