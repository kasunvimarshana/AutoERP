# ─── Upstream definitions ────────────────────────────────────────────────────
upstream auth_service {
    server auth-service:8001;
    keepalive 32;
}

upstream user_service {
    server user-service:8002;
    keepalive 32;
}

upstream product_service {
    server product-service:8003;
    keepalive 32;
}

upstream inventory_service {
    server inventory-service:8004;
    keepalive 32;
}

upstream order_service {
    server order-service:8005;
    keepalive 32;
}

# ─── API Gateway ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Propagate real IP from load balancer
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_zone burst=20 nodelay;
        proxy_pass http://auth_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── User Service ──────────────────────────────────────────────────────────
    location /api/users/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://user_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Product Service ───────────────────────────────────────────────────────
    location /api/products/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://product_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Inventory Service ─────────────────────────────────────────────────────
    location /api/inventory/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://inventory_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Order Service ─────────────────────────────────────────────────────────
    location /api/orders/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://order_service/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Health aggregation endpoint ───────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Deny all other paths ──────────────────────────────────────────────────
    location / {
        return 404 '{"error":"Not Found"}';
        add_header Content-Type application/json;
    }
}
