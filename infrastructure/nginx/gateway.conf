# ============================================================
#  API Gateway – Nginx Reverse Proxy Configuration
#  Routes inbound requests to the correct microservice
# ============================================================

# ----------------------------------------------------------------
# Upstream definitions (Docker DNS resolves service names)
# ----------------------------------------------------------------
upstream order_service {
    least_conn;
    server order-service:8001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream inventory_service {
    least_conn;
    server inventory-service:8002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream payment_service {
    least_conn;
    server payment-service:8003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream notification_service {
    least_conn;
    server notification-service:8004 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream api_gateway {
    server api-gateway:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================================
# Rate-limiting zones (per-IP)
# ============================================================
limit_req_zone $binary_remote_addr zone=api_global:10m   rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=20r/s;
limit_req_zone $binary_remote_addr zone=payment_zone:10m rate=30r/s;

# ============================================================
# CORS origin map
# – Set $cors_origin to the incoming Origin when it is trusted,
#   empty string otherwise.  Add more origins as required.
# ============================================================
map $http_origin $cors_origin {
    default                    "";
    "~^http://localhost(:\d+)?$"  $http_origin;
    "~^https://yourdomain\.com$"  $http_origin;
}

# ============================================================
# Main server block
# ============================================================
server {
    listen 80;
    server_name localhost;

    # Security headers (applied unconditionally)
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin"                  always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS headers – set for every response when origin is trusted
    add_header Access-Control-Allow-Origin      $cors_origin              always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-SAGA-Transaction-ID" always;
    add_header Access-Control-Allow-Credentials "true"                    always;
    add_header Access-Control-Max-Age           1728000                   always;

    server_tokens off;

    # Body / buffer tuning
    client_max_body_size    50M;
    client_body_buffer_size 128k;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    # Timeouts
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # Logging
    access_log /var/log/nginx/gateway_access.log combined;
    error_log  /var/log/nginx/gateway_error.log  warn;

    # ----------------------------------------------------------------
    # Health check (no rate-limit, no auth required)
    # ----------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ----------------------------------------------------------------
    # OPTIONS pre-flight – respond immediately for ALL /api/* paths.
    # Nginx matches the most specific prefix, so preflight for any
    # /api/v1/xxx route is handled here before reaching upstreams.
    # ----------------------------------------------------------------
    location ~* ^/api/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Shared proxy settings reused by nested location blocks
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $http_host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-SAGA-Transaction-ID $http_x_saga_transaction_id;

        # Global rate limit (burst allows short spikes)
        limit_req zone=api_global burst=200 nodelay;
        limit_req_status 429;

        # ---- Auth routes → API Gateway ----
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=40 nodelay;
            proxy_pass http://api_gateway;
        }

        # ---- Order routes → Order Service ----
        location /api/v1/orders/ {
            proxy_pass http://order_service;
        }

        # ---- Inventory routes → Inventory Service ----
        location /api/v1/inventory/ {
            proxy_pass http://inventory_service;
        }

        # ---- Payment routes → Payment Service ----
        location /api/v1/payments/ {
            limit_req zone=payment_zone burst=60 nodelay;
            proxy_read_timeout 30s;
            proxy_pass http://payment_service;
        }

        # ---- Notification routes → Notification Service ----
        location /api/v1/notifications/ {
            proxy_pass http://notification_service;
        }

        # ---- Catch-all for unmatched /api/* paths ----
        return 404 '{"error":"Route not found","code":404}';
        add_header Content-Type application/json always;
    }

    # ----------------------------------------------------------------
    # All other traffic – redirect to /api/
    # ----------------------------------------------------------------
    location / {
        return 301 /api/;
    }

    # ----------------------------------------------------------------
    # Error pages
    # ----------------------------------------------------------------
    error_page 429 /errors/429.json;
    error_page 502 503 504 /errors/50x.json;

    location /errors/ {
        internal;
        root /etc/nginx;
    }
}
