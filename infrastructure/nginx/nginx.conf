# =============================================================================
# Nginx — Main Configuration
# Production-grade: worker tuning, gzip, security headers, logging
# =============================================================================

user  nginx;

# Auto-detect CPU cores for worker processes
worker_processes  auto;

# Maximum number of open file descriptors per worker
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ---------------------------------------------------------------------------
# Events Block
# ---------------------------------------------------------------------------
events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

# ---------------------------------------------------------------------------
# HTTP Block
# ---------------------------------------------------------------------------
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # -----------------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;

    client_body_timeout       60s;
    client_header_timeout     60s;
    send_timeout              60s;

    # Limit request body to 50 MB (increase if file uploads are needed)
    client_max_body_size      50m;
    client_body_buffer_size   128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;

    # -----------------------------------------------------------------------
    # File Cache
    # -----------------------------------------------------------------------
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # -----------------------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        font/opentype
        image/svg+xml
        image/x-icon;

    # -----------------------------------------------------------------------
    # Security Headers (global defaults — overridden per server block)
    # -----------------------------------------------------------------------
    server_tokens             off;
    more_clear_headers        Server;

    # -----------------------------------------------------------------------
    # Rate Limiting Zones
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=200r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -----------------------------------------------------------------------
    # Upstream Definitions (also defined in conf.d/default.conf)
    # -----------------------------------------------------------------------
    # Kept here as global reference; conf.d overrides take precedence.

    # -----------------------------------------------------------------------
    # Proxy Cache Settings
    # -----------------------------------------------------------------------
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # -----------------------------------------------------------------------
    # Include Virtual Hosts
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
