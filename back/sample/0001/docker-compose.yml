version: '3.9'

# -----------------------------------------------------------------------
# Laravel Microservices — Distributed Transaction Demo
#
# Services:
#   order-service      → :8001
#   inventory-service  → :8002
#   order-db           → PostgreSQL for Order Service
#   inventory-db       → PostgreSQL for Inventory Service
#   redis              → shared cache / queue broker
# -----------------------------------------------------------------------

services:

  # ── Order Service ────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8001:80"
    environment:
      APP_ENV: local
      APP_KEY: base64:order-service-key-32-chars-here=
      DB_CONNECTION: pgsql
      DB_HOST: order-db
      DB_PORT: 5432
      DB_DATABASE: orders
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      # URL that the Order Service uses to reach the Inventory Service
      INVENTORY_SERVICE_URL: http://inventory-service
      INVENTORY_SERVICE_TIMEOUT: 5
      INVENTORY_SERVICE_RETRIES: 3
      REDIS_HOST: redis
      LOG_CHANNEL: stderr
    depends_on:
      order-db:
        condition: service_healthy
      inventory-service:
        condition: service_started
    networks:
      - microservices

  # ── Inventory Service ─────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    ports:
      - "8002:80"
    environment:
      APP_ENV: local
      APP_KEY: base64:inventory-service-key-32-chars=
      DB_CONNECTION: pgsql
      DB_HOST: inventory-db
      DB_PORT: 5432
      DB_DATABASE: inventory
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: redis
      LOG_CHANNEL: stderr
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - microservices

  # ── Databases ─────────────────────────────────────────────────────────
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  # ── Redis (shared) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - microservices

volumes:
  order-db-data:
  inventory-db-data:

networks:
  microservices:
    driver: bridge
