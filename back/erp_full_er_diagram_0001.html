let current = 'all';
window.show = async function(mod) {
  current = mod;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase().replace(' ','') === mod || (mod === 'all' && b.textContent.trim() === 'All modules')));
  const el = document.getElementById('erd');
  el.innerHTML = '<div style="padding:20px;color:var(--color-text-secondary);font-size:13px">Rendering…</div>';
  try {
    const { svg } = await mermaid.render('erd-svg-'+mod+Date.now(), diagrams[mod]);
    el.innerHTML = svg;
    postProcess();
  } catch(e) { el.innerHTML = '<div style="padding:20px;color:var(--color-text-danger)">Render error: '+e.message+'</div>'; }
};

function postProcess() {
  document.querySelectorAll('#erd svg .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x); rect.setAttribute('y',y);
    rect.setAttribute('width',w); rect.setAttribute('height',h);
    rect.setAttribute('rx','8');
    for (const a of ['fill','stroke','stroke-width','class','style'])
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    firstPath.replaceWith(rect);
  });
  document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => p.setAttribute('stroke','none'));
}
